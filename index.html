function fmtTime(iso){return new Date(iso).toLocaleTimeString("fr-CH",{hour:"2-digit",minute:"2-digit",timeZone:"Europe/Zurich"});}
function fmtDate(iso){
  const d=new Date(iso),now=new Date();
  const ds=d.toLocaleDateString("fr-CH",{timeZone:"Europe/Zurich"});
  const ns=now.toLocaleDateString("fr-CH",{timeZone:"Europe/Zurich"});
  const ys=new Date(now-86400000).toLocaleDateString("fr-CH",{timeZone:"Europe/Zurich"});
  if(ds===ns)return"Aujourd'hui";if(ds===ys)return"Hier";
  return d.toLocaleDateString("fr-CH",{weekday:"short",day:"numeric",month:"short",timeZone:"Europe/Zurich"});
}
function durLabel(m){if(!m)return"";return m<60?`${m} min`:`${Math.floor(m/60)}h${String(m%60).padStart(2,"0")}`;}
function timeAgo(iso){
  const m=Math.round((Date.now()-new Date(iso))/60000);
  if(m<1)return"à l'instant";if(m<60)return`il y a ${m} min`;
  const h=Math.floor(m/60),rm=m%60;
  return rm>0?`il y a ${h}h${String(rm).padStart(2,"0")}`:`il y a ${h}h`;
}
function dateZH(iso){return new Date(iso).toLocaleDateString("fr-CH",{timeZone:"Europe/Zurich"});}
function todayZH(){return new Date().toLocaleDateString("fr-CH",{timeZone:"Europe/Zurich"});}

// Groupe les tétées G+D successives (< 30min) en une seule session
function groupFeeds(entries){
  const feeds=[...entries].filter(e=>e.cat==="feed").sort((a,b)=>new Date(a.ts)-new Date(b.ts));
  const sessions=[];
  let i=0;
  while(i<feeds.length){
    const cur=feeds[i];
    if(i+1<feeds.length){
      const next=feeds[i+1];
      const diffMin=(new Date(next.ts)-new Date(cur.ts))/60000;
      const sides=new Set([cur.side,next.side]);
      if(diffMin<=30&&sides.has("Gauche")&&sides.has("Droit")){
        sessions.push({...cur,side:"Les deux",_merged:true,_end:next.ts});
        i+=2;continue;
      }
    }
    sessions.push(cur);i++;
  }
  return sessions;
}

function groupByDay(entries){
  const g={};
  [...entries].sort((a,b)=>new Date(b.ts)-new Date(a.ts)).forEach(e=>{
    const k=dateZH(e.ts);if(!g[k])g[k]=[];g[k].push(e);
  });
  return g;
}

// Check soins du matin (vitamines + nombril)
function checkMorningSoins(entries){
  const today=todayZH();
  const todayE=entries.filter(e=>dateZH(e.ts)===today);
  const vitDone=todayE.some(e=>e.cat==="vitamin"&&e.vitaminDone);
  const nombrilDone=todayE.some(e=>e.cat==="nombril");
  return{vitDone,nombrilDone};
}

function ImportForm({onImport}){
  const[date,setDate]=useState(localNow().slice(0,10));
  const[rows,setRows]=useState([{time:"",type:"feed",side:"Gauche",note:""}]);
  function addRow(){setRows(r=>[...r,{time:"",type:"feed",side:"Gauche",note:""}]);}
  function removeRow(i){setRows(r=>r.filter((_,j)=>j!==i));}
  function upd(i,k,v){setRows(r=>r.map((row,j)=>j===i?{...row,[k]:v}:row));}
  function doImport(){
    const entries=[];
    rows.forEach((row,i)=>{
      if(!row.time)return;
      const ts=new Date(`${date}T${row.time}:00+02:00`).toISOString();
      const id=Date.now()+i+Math.random();
      if(row.type==="feed")entries.push({id,cat:"feed",side:row.side,note:row.note||undefined,ts,author:"carnet"});
      else if(row.type==="pipi")entries.push({id,cat:"diaper_wet",ts,author:"carnet"});
      else if(row.type==="caca")entries.push({id,cat:"diaper_poo",ts,author:"carnet"});
      else if(row.type==="pipi+caca"){entries.push({id:id+0.1,cat:"diaper_wet",ts,author:"carnet"});entries.push({id:id+0.2,cat:"diaper_poo",ts,author:"carnet"});}
      else if(row.type==="vitamine")entries.push({id,cat:"vitamin",vitaminDone:true,note:row.note||undefined,ts,author:"carnet"});
      else if(row.type==="nombril")entries.push({id,cat:"nombril",ts,author:"carnet"});
      else if(row.type==="nez")entries.push({id,cat:"nez",ts,author:"carnet"});
      else if(row.type==="poids"){const w=parseFloat(row.note);if(!isNaN(w))entries.push({id,cat:"weight",weight:w,ts,author:"carnet"});}
      else if(row.type==="note")entries.push({id,cat:"note",note:row.note||"",ts,author:"carnet"});
    });
    if(entries.length>0){onImport(entries);setRows([{time:"",type:"feed",side:"Gauche",note:""}]);}
  }
  const types=[["feed","🤱 Allaitement"],["pipi","💧 Pipi"],["caca","💩 Caca"],["pipi+caca","💧💩 Pipi+Caca"],["vitamine","💊 Vitamine"],["nombril","🌀 Nombril"],["nez","👃 Rinçage nez"],["poids","⚖️ Poids (kg)"],["note","📝 Note"]];
  return(<div style={{display:"flex",flexDirection:"column",gap:14}}>
    <Inp label="Date" type="date" value={date} onChange={e=>setDate(e.target.value)}/>
    {rows.map((row,i)=>(<div key={i} style={{background:C.bg,borderRadius:12,padding:12,border:`1px solid ${C.border}`,display:"flex",flexDirection:"column",gap:8}}>
      <div style={{display:"flex",gap:8,alignItems:"center"}}>
        <input type="time" value={row.time} onChange={e=>upd(i,"time",e.target.value)} style={{...iSt,width:110,flexShrink:0}}/>
        <select value={row.type} onChange={e=>upd(i,"type",e.target.value)} style={{...iSt,flex:1}}>{types.map(([v,l])=><option key={v} value={v}>{l}</option>)}</select>
        <button onClick={()=>removeRow(i)} style={{background:"none",border:"none",fontSize:20,color:C.muted,cursor:"pointer",flexShrink:0}}>×</button>
      </div>
      {row.type==="feed"&&<select value={row.side} onChange={e=>upd(i,"side",e.target.value)} style={iSt}><option>Gauche</option><option>Droit</option><option>Les deux</option><option>Biberon</option></select>}
      {(row.type==="poids"||row.type==="note")&&<input value={row.note} onChange={e=>upd(i,"note",e.target.value)} placeholder={row.type==="poids"?"ex: 3.400":"remarque..."} style={iSt}/>}
    </div>))}

    <Btn color={C.accent} onClick={doImport}>Importer {rows.filter(r=>r.time).length} entrée(s)</Btn>
  </div>);
}

function fmtShortDate(iso){

  const month=String(d.toLocaleDateString("fr-CH",{month:"numeric",timeZone:"Europe/Zurich"})).padStart(2,"0");

function StatsTab({entries}){
  const now=new Date();

  // Helpers
  function entriesInDays(n){
    const since=new Date(now.getTime()-n*86400000);
    return entries.filter(e=>new Date(e.ts)>=since);
  }
  function byDay(n){
    const days=[];
    for(let i=n-1;i>=0;i--){
      const d=new Date(now.getTime()-i*86400000);
      const k=d.toLocaleDateString("fr-CH",{timeZone:"Europe/Zurich"});
      const label=i===0?"Auj.":i===1?"Hier":d.toLocaleDateString("fr-CH",{day:"numeric",month:"numeric",timeZone:"Europe/Zurich"});
      days.push({k,label});
    }
    return days;
  }

  const days7=byDay(7);
  const e7=entriesInDays(7);
  const e3=entriesInDays(3);

  // Feeds groupés
  function feedSessionsIn(list){return groupFeeds(list);}

  // Par jour sur 7j
  const feedsByDay=days7.map(d=>({...d,v:feedSessionsIn(entries.filter(e=>dateZH(e.ts)===d.k)).length}));
  const wetByDay=days7.map(d=>({...d,v:entries.filter(e=>(e.cat==="diaper_wet"||e.cat==="diaper_both")&&dateZH(e.ts)===d.k).length}));
  const pooByDay=days7.map(d=>({...d,v:entries.filter(e=>(e.cat==="diaper_poo"||e.cat==="diaper_both")&&dateZH(e.ts)===d.k).length}));

  // Moyennes 7j
  const avg=arr=>arr.length?Math.round(arr.reduce((s,x)=>s+x,0)/arr.length*10)/10:0;
  const avgFeeds=avg(feedsByDay.map(d=>d.v));
  const avgWet=avg(wetByDay.map(d=>d.v));
  const avgPoo=avg(pooByDay.map(d=>d.v));

  // Intervalle moyen entre tétées
  const allFeeds=entries.filter(e=>e.cat==="feed").sort((a,b)=>new Date(a.ts)-new Date(b.ts));
  const feedGaps=allFeeds.slice(1).map((e,i)=>(new Date(e.ts)-new Date(allFeeds[i].ts))/60000).filter(g=>g>20&&g<360);
  const avgGap=feedGaps.length?Math.round(feedGaps.reduce((s,x)=>s+x,0)/feedGaps.length):null;

  // Poids
  const weights=entries.filter(e=>e.cat==="weight").sort((a,b)=>new Date(a.ts)-new Date(b.ts));
  const weightGain=weights.length>=2?(weights[weights.length-1].weight-weights[0].weight)*1000:null;
  const daysSinceBirth=weights.length>=2?Math.round((new Date(weights[weights.length-1].ts)-new Date(weights[0].ts))/86400000):null;
  const dailyGain=weightGain&&daysSinceBirth?Math.round(weightGain/daysSinceBirth):null;

  // Nuits (22h-6h)
  const nightFeeds=entries.filter(e=>{
    if(e.cat!=="feed")return false;
    const h=new Date(e.ts).toLocaleTimeString("fr-CH",{hour:"2-digit",timeZone:"Europe/Zurich"}).split(":")[0];
    return +h>=22||+h<6;
  });
  const nightByDay=days7.map(d=>({...d,v:nightFeeds.filter(e=>dateZH(e.ts)===d.k).length}));
  const avgNightFeeds=avg(nightByDay.map(d=>d.v));

  // Soins compliance 7j
  const vitDays=days7.filter(d=>entries.some(e=>e.cat==="vitamin"&&e.vitaminDone&&dateZH(e.ts)===d.k)).length;
  const nombrilDays=days7.filter(d=>entries.some(e=>e.cat==="nombril"&&dateZH(e.ts)===d.k)).length;

  // Dernières 48h vs 48h précédentes
  const e48a=entries.filter(e=>new Date(e.ts)>=new Date(now-48*3600000)&&new Date(e.ts)<new Date(now-24*3600000));
  const e48b=entriesInDays(1);
  const trend=(cat,prev,curr)=>{
    const p=prev.filter(e=>e.cat===cat).length;
    const c=curr.filter(e=>e.cat===cat).length;
    if(c>p)return{arrow:"↑",color:C.sage};
    if(c<p)return{arrow:"↓",color:C.red};
    return{arrow:"→",color:C.muted};
  };
  const tFeed=trend("feed",e48a,e48b);
  const tWet=trend("diaper_wet",e48a,e48b);
  const tPoo=trend("diaper_poo",e48a,e48b);

  // Mini bar chart
  function BarChart({data,color,max}){
    const m=max||Math.max(...data.map(d=>d.v),1);
    return(<div style={{display:"flex",alignItems:"flex-end",gap:4,height:60}}>
      {data.map((d,i)=>(
        <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
          <div style={{fontSize:9,color:C.muted,fontWeight:600}}>{d.v||""}</div>
          <div style={{width:"100%",background:color,opacity:0.15+0.85*(d.v/m),borderRadius:"4px 4px 0 0",height:Math.max(d.v/m*44,d.v?4:0)}}/>
          <div style={{fontSize:8,color:C.muted,textAlign:"center",lineHeight:1.1}}>{d.label}</div>
        </div>
      ))}
    </div>);
  }

  const Section=({title,children})=>(
    <div style={{background:C.surface,borderRadius:16,padding:"16px",border:`1px solid ${C.border}`}}>
      <div style={{fontSize:12,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:1,marginBottom:14}}>{title}</div>
      {children}
    </div>
  );

  const KV=({label,value,sub,color})=>(
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",paddingBottom:8,borderBottom:`1px solid ${C.border}`,marginBottom:8}}>
      <span style={{fontSize:13,color:C.muted}}>{label}</span>
      <span style={{fontSize:15,fontWeight:700,color:color||C.text}}>{value}{sub&&<span style={{fontSize:11,fontWeight:400,color:C.muted,marginLeft:4}}>{sub}</span>}</span>
    </div>
  );

  return(<div style={{display:"flex",flexDirection:"column",gap:16}}>

    {/* Tendances 24h */}
    <Section title="📈 Tendances (24h vs veille)">
      <div style={{display:"flex",gap:10}}>
        {[["🤱","Allaitement",tFeed],["💧","Pipi",tWet],["💩","Caca",tPoo]].map(([emoji,label,t])=>(
          <div key={label} style={{flex:1,background:C.bg,borderRadius:12,padding:"10px 8px",textAlign:"center"}}>
            <div style={{fontSize:22}}>{emoji}</div>
            <div style={{fontSize:22,fontWeight:800,color:t.color}}>{t.arrow}</div>
            <div style={{fontSize:10,color:C.muted,fontWeight:600}}>{label}</div>
          </div>
        ))}
      </div>
    </Section>

    {/* Moyennes 7j */}
    <Section title="📊 Moyennes sur 7 jours">
      <KV label="Allaitements / jour" value={avgFeeds}/>
      <KV label="Pipi / jour" value={avgWet}/>
      <KV label="Caca / jour" value={avgPoo}/>
      <KV label="Tétées nocturnes (22h-6h)" value={avgNightFeeds}/>
      {avgGap&&<KV label="Intervalle moyen entre tétées" value={durLabel(avgGap)}/>}
    </Section>

    {/* Graphiques */}
    <Section title="🤱 Allaitements par jour">
      <BarChart data={feedsByDay} color={C.accent}/>
    </Section>
    <Section title="💧 Pipi par jour">
      <BarChart data={wetByDay} color={C.sky}/>
    </Section>
    <Section title="💩 Caca par jour">
      <BarChart data={pooByDay} color={C.golden}/>
    </Section>

    {/* Poids */}
    {weights.length>=2&&<Section title="⚖️ Croissance">
      <KV label="Poids initial" value={`${weights[0].weight} kg`} sub={fmtShortDate(weights[0].ts)}/>
      <KV label="Poids actuel" value={`${weights[weights.length-1].weight} kg`} sub={fmtShortDate(weights[weights.length-1].ts)}/>
      {weightGain!==null&&<KV label="Prise de poids totale" value={`+${weightGain} g`} color={C.sage}/>}
      {dailyGain&&<KV label="Gain moyen / jour" value={`+${dailyGain} g`} color={dailyGain>=15&&dailyGain<=40?C.sage:C.golden}/>}
    </Section>}

    {/* Soins */}
    <Section title="💊 Soins — 7 derniers jours">
      <KV label="Vitamines données" value={`${vitDays}/7 jours`} color={vitDays>=6?C.sage:vitDays>=4?C.golden:C.red}/>
      <KV label="Nombril désinfecté" value={`${nombrilDays}/7 jours`} color={nombrilDays>=6?C.sage:nombrilDays>=4?C.golden:C.red}/>
    </Section>

    {/* Faits marquants */}
    <Section title="✨ Faits marquants">
      {weightGain!==null&&<div style={{background:C.sageLight,borderRadius:10,padding:"10px 12px",fontSize:13,color:C.sage,marginBottom:8}}>
        ⚖️ Rose a pris <strong>{weightGain} g</strong> depuis sa naissance{dailyGain?` (${dailyGain} g/jour)`:""}
      </div>}
      {avgGap&&<div style={{background:C.accentLight,borderRadius:10,padding:"10px 12px",fontSize:13,color:C.accent,marginBottom:8}}>
        🤱 Elle se nourrit en moyenne toutes les <strong>{durLabel(avgGap)}</strong>
      </div>}
      {avgNightFeeds>0&&<div style={{background:C.lavenderLight,borderRadius:10,padding:"10px 12px",fontSize:13,color:C.lavender,marginBottom:8}}>
        🌙 <strong>{avgNightFeeds}</strong> tétée{avgNightFeeds>1?"s":""} nocturne{avgNightFeeds>1?"s":""} par nuit en moyenne
      </div>}
      {vitDays<7&&<div style={{background:C.redLight,borderRadius:10,padding:"10px 12px",fontSize:13,color:C.red,marginBottom:8}}>
        💊 Vitamines oubliées <strong>{7-vitDays} jour{7-vitDays>1?"s":""}</strong> cette semaine
      </div>}
      {avgPoo<1&&<div style={{background:C.goldenLight,borderRadius:10,padding:"10px 12px",fontSize:13,color:C.golden,marginBottom:8}}>
        💩 Moins d'un caca par jour en moyenne — à surveiller
      </div>}
      {avgPoo>=3&&<div style={{background:C.goldenLight,borderRadius:10,padding:"10px 12px",fontSize:13,color:C.golden,marginBottom:8}}>
        💩 <strong>{avgPoo}</strong> cacas par jour — fréquence élevée, normal chez le nourrisson
      </div>}
    </Section>

  </div>);
}

function WeightChart({entries}){
  const ws=entries.filter(e=>e.cat==="weight").sort((a,b)=>new Date(a.ts)-new Date(b.ts));
  if(ws.length<2)return<div style={{color:C.muted,textAlign:"center",padding:"40px 0"}}>Ajoutez au moins 2 pesées.</div>;

  const PX=48,PY=24,PB=28;
  const minPts=Math.max(ws.length,6);
  const W=Math.max(320,minPts*60);
  const H=220;
  const innerW=W-PX*2;
  const innerH=H-PY-PB;

  const minW=Math.min(...ws.map(e=>e.weight))-0.05;
  const maxW=Math.max(...ws.map(e=>e.weight))+0.05;
  const toX=i=>PX+i*(innerW/(ws.length-1));
  const toY=w=>PY+(1-(w-minW)/(maxW-minW))*innerH;

  const pts=ws.map((e,i)=>({x:toX(i),y:toY(e.weight),w:e.weight,ts:e.ts}));
  const path=pts.map((p,i)=>`${i===0?"M":"L"}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(" ");
  const area=`${path} L${pts[pts.length-1].x},${PY+innerH} L${pts[0].x},${PY+innerH} Z`;

  // Graduations axe Y
  const yTicks=4;
  const yVals=Array.from({length:yTicks+1},(_,i)=>minW+(maxW-minW)*i/yTicks);

  return(<div>
    <div style={{fontSize:12,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:1,marginBottom:12}}>Courbe de poids</div>
    <div style={{overflowX:"auto",overflowY:"hidden",WebkitOverflowScrolling:"touch",margin:"0 -16px",padding:"0 16px"}}>
      <svg viewBox={`0 0 ${W} ${H}`} style={{width:Math.max(W,window.innerWidth-32),minWidth:W,height:H,display:"block"}}>
        <rect width={W} height={H} fill={C.bg} rx={14}/>
        {/* Grid + Y labels */}
        {yVals.map((v,i)=>(
          <g key={i}>
            <line x1={PX} y1={toY(v)} x2={W-PX} y2={toY(v)} stroke={C.border} strokeDasharray="4 3" strokeWidth={0.8}/>
            <text x={PX-6} y={toY(v)+4} fontSize={9} fill={C.muted} textAnchor="end">{v.toFixed(3)}</text>
          </g>
        ))}
        {/* Area fill */}
        <path d={area} fill={C.sage} fillOpacity={0.08}/>
        {/* Line */}
        <path d={path} fill="none" stroke={C.sage} strokeWidth={2.5} strokeLinejoin="round" strokeLinecap="round"/>
        {/* Points + labels */}
        {pts.map((p,i)=>(
          <g key={i}>
            <circle cx={p.x} cy={p.y} r={5} fill={C.sage} stroke="#fff" strokeWidth={1.5}/>
            <text x={p.x} y={p.y-11} fontSize={10} fill={C.sage} textAnchor="middle" fontWeight={700}>{p.w.toFixed(3)}</text>
            <text x={p.x} y={H-8} fontSize={9} fill={C.muted} textAnchor="middle">{fmtShortDate(p.ts)}</text>
          </g>
        ))}
      </svg>
    </div>
  </div>);
}

function Settings({data,onUpdate,syncStatus}){
  const[name,setName]=useState(data.babyName);
  const[birth,setBirth]=useState(data.birthDate);
  const[author,setAuthor]=useState(()=>{try{return localStorage.getItem("bt_author")||"";}catch{return"";}});
  function saveAuthor(v){setAuthor(v);try{localStorage.setItem("bt_author",v);}catch{}}
  const sc={ok:{bg:C.sageLight,c:C.sage,t:"✓ Synchronisé avec Firebase"},syncing:{bg:"#FFF8E1",c:C.golden,t:"🔄 Synchronisation…"},error:{bg:C.redLight,c:C.red,t:"⚠️ Erreur de connexion"},offline:{bg:"#F5F5F5",c:C.muted,t:"📴 Mode hors ligne"}}[syncStatus]||{};
  return(<div style={{display:"flex",flexDirection:"column",gap:18}}>
    <div style={{background:sc.bg,borderRadius:12,padding:"12px 16px",fontSize:13,color:sc.c,fontWeight:600}}>{sc.t}</div>
    <Inp label="Prénom du bébé" value={name} onChange={e=>setName(e.target.value)}/>
    <Inp label="Date de naissance" type="date" value={birth} onChange={e=>setBirth(e.target.value)}/>
    <Inp label="Votre prénom (Papa / Maman)" value={author} onChange={e=>saveAuthor(e.target.value)} placeholder="ex: Papa"/>
    <Btn color={C.accent} onClick={()=>onUpdate({babyName:name,birthDate:birth})}>Sauvegarder</Btn>
    <hr style={{border:"none",borderTop:`1px solid ${C.border}`}}/>
    <div style={{fontSize:13,color:C.muted}}><strong>{data.entries.length}</strong> entrées</div>
  </div>);
}

// ─── App ──────────────────────────────────────────────────────────────────────
function App(){
  const[data,setData]=useState(DEFAULT);
  const[tab,setTab]=useState("home");
  const[modal,setModal]=useState(null); // {type, entry?}
  const[syncStatus,setSyncStatus]=useState("syncing");
  const saveTimer=useRef(null);

  useEffect(()=>{
    fbRead().then(remote=>{
      if(remote&&remote.entries&&remote.entries.length>0){setData(remote);setSyncStatus("ok");}
      else{fbWrite(DEFAULT).then(()=>setSyncStatus("ok"));}
    }).catch(()=>setSyncStatus("offline"));
  },[]);

  useEffect(()=>{
    const id=setInterval(()=>{
      fbRead().then(remote=>{
        if(!remote)return;
        setData(prev=>{
          const ids=new Set(prev.entries.map(e=>e.id));
          const newE=remote.entries.filter(e=>!ids.has(e.id));
          if(!newE.length&&remote.babyName===prev.babyName)return prev;
          return{...remote,entries:[...prev.entries,...newE].sort((a,b)=>new Date(b.ts)-new Date(a.ts))};
        });
        setSyncStatus("ok");
      }).catch(()=>setSyncStatus("offline"));
    },20000);
    return()=>clearInterval(id);
  },[]);

  function persist(next){
    setData(next);setSyncStatus("syncing");
    clearTimeout(saveTimer.current);
    saveTimer.current=setTimeout(()=>{
      fbWrite(next).then(()=>setSyncStatus("ok")).catch(()=>setSyncStatus("error"));
    },800);
  }

  const author=()=>{try{return localStorage.getItem("bt_author")||"";}catch{return"";}};

  function addEntry(payload){
    const entry={id:Date.now()+Math.random(),...payload,author:author()||undefined};
    persist({...data,entries:[entry,...data.entries]});
    setModal(null);
  }

  function editEntry(payload){
    const updated=data.entries.map(e=>e.id===modal.entry.id?{...e,...payload}:e);
    persist({...data,entries:updated});
    setModal(null);
  }

  function importEntries(entries){
    persist({...data,entries:[...entries,...data.entries]});
    setModal(null);
  }
  function deleteEntry(id){persist({...data,entries:data.entries.filter(e=>e.id!==id)});}
  function updateMeta(patch){persist({...data,...patch});}

  function ageLabel(){
    if(!data.birthDate)return null;
    const days=Math.floor((Date.now()-new Date(data.birthDate))/86400000);
    if(days<7)return`${days} jour${days>1?"s":""}`;
    if(days<56)return`${Math.floor(days/7)} semaine${Math.floor(days/7)>1?"s":""}`;
    return`${Math.floor(days/30)} mois`;
  }

  const isEditing=modal&&modal.entry;
  const modalType=modal?.type;
  const modalEntry=modal?.entry;

  const QUICK=[
    {cat:"feed",    color:C.accent},
    {cat:"diaper_wet", color:C.sky},
    {cat:"diaper_poo", color:C.golden},
    {cat:"diaper_both",color:C.golden},
    {cat:"sleep",   color:C.lavender},
    {cat:"vitamin", color:C.accent},
    {cat:"nombril", color:C.teal},
    {cat:"nez",     color:C.sky},
    {cat:"weight",  color:C.sage},
    {cat:"temperature",color:C.red},
    {cat:"note",    color:C.muted},
  ];

  const sorted=[...data.entries].sort((a,b)=>new Date(b.ts)-new Date(a.ts));
  const syncDot={ok:"🟢",syncing:"🟡",error:"🔴",offline:"⚫"}[syncStatus]||"🟡";

  function openModal(cat){setModal({type:cat});}
  function openEdit(entry){setModal({type:entry.cat,entry});}

  function handleSave(payload){
    if(isEditing)editEntry(payload);
    else addEntry(payload);
  }

  return(<div style={{background:C.bg,minHeight:"100vh",color:C.text}}>
    <div style={{background:C.surface,borderBottom:`1px solid ${C.border}`,padding:"14px 20px 12px",position:"sticky",top:0,zIndex:40}}>
      <div style={{maxWidth:480,margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div>
          <div style={{fontSize:20,fontWeight:800,color:C.accent}}>🌸 {data.babyName}</div>
          {ageLabel()&&<div style={{fontSize:12,color:C.muted,marginTop:2}}>{ageLabel()}</div>}
        </div>
        <span style={{fontSize:18}}>{syncDot}</span>
      </div>
    </div>

    <div style={{maxWidth:480,margin:"0 auto",padding:"20px 16px 100px"}}>
      {tab==="home"&&(<div style={{display:"flex",flexDirection:"column",gap:24}}>
        <TodayStats entries={data.entries}/>
        <div>
          <div style={{fontSize:12,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:1,marginBottom:12}}>Ajouter</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8}}>
            {QUICK.map(({cat})=>{const c=CATS[cat];return(
              <button key={cat} onClick={()=>openModal(cat)} style={{background:C.surface,border:`1.5px solid ${C.border}`,borderRadius:14,padding:"10px 4px 8px",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
                <span style={{fontSize:22}}>{c.emoji}</span>
                <span style={{fontSize:10,color:C.muted,fontWeight:600,textAlign:"center",lineHeight:1.2}}>{c.label}</span>
              </button>
            );})}
          </div>
        </div>
        <button onClick={()=>setModal({type:"import"})} style={{background:C.surface,border:`1.5px dashed ${C.accent}`,borderRadius:14,padding:"12px",cursor:"pointer",color:C.accent,fontWeight:700,fontSize:14}}>
          📋 Importer depuis le carnet
        </button>
        {sorted.length>0&&(<div>
          <div style={{fontSize:12,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>Récent</div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>{sorted.slice(0,5).map(e=><EntryCard key={e.id} entry={e} onDelete={deleteEntry} onEdit={openEdit}/>)}</div>
          {sorted.length>5&&<button onClick={()=>setTab("journal")} style={{background:"none",border:"none",color:C.accent,fontWeight:700,cursor:"pointer",marginTop:8,fontSize:14}}>Voir tout le journal →</button>}
        </div>)}
      </div>)}
      {tab==="journal"&&<Journal entries={data.entries} onDelete={deleteEntry} onEdit={openEdit}/>}
      {tab==="stats"&&<StatsTab entries={data.entries}/>}
      {tab==="weight"&&<WeightChart entries={data.entries}/>}
      {tab==="settings"&&<Settings data={data} onUpdate={updateMeta} syncStatus={syncStatus}/>}
    </div>

    <div style={{position:"fixed",bottom:0,left:0,right:0,background:C.surface,borderTop:`1px solid ${C.border}`,display:"flex",justifyContent:"space-around",padding:"8px 0 20px",zIndex:50}}>
      {[["home","🏠","Accueil"],["journal","📋","Journal"],["stats","📊","Stats"],["weight","📈","Courbe"],["settings","⚙️","Réglages"]].map(([t,emoji,label])=>(
        <button key={t} onClick={()=>setTab(t)} style={{background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,color:tab===t?C.accent:C.muted,fontWeight:tab===t?700:400,fontSize:11}}>
          <span style={{fontSize:22}}>{emoji}</span>{label}
        </button>
      ))}
    </div>

    {modal&&(
      <div style={{position:"fixed",inset:0,background:"rgba(45,33,24,0.45)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:100}}
        onClick={e=>{if(e.target===e.currentTarget)setModal(null);}}>
        <div style={{background:C.surface,borderRadius:"20px 20px 0 0",padding:"20px 20px 40px",width:"100%",maxWidth:480,maxHeight:"85vh",overflowY:"auto"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
            <div style={{fontSize:18,fontWeight:800}}>
              {modalType==="import"?"📋 Import carnet":isEditing?"✏️ Modifier":<>{CATS[modalType]?.emoji} {CATS[modalType]?.label}</>}
            </div>
            <button onClick={()=>setModal(null)} style={{background:"none",border:"none",fontSize:24,cursor:"pointer",color:C.muted}}>×</button>
          </div>
          {modalType==="feed"&&<FeedForm onSave={handleSave} initial={modalEntry}/>}
          {(modalType==="diaper_wet"||modalType==="diaper_poo"||modalType==="diaper_both")&&<DiaperForm type={modalType} onSave={handleSave} initial={modalEntry}/>}
          {modalType==="sleep"&&<SleepForm onSave={handleSave} initial={modalEntry}/>}
          {modalType==="weight"&&<WeightForm onSave={handleSave} initial={modalEntry}/>}
          {modalType==="temperature"&&<TempForm onSave={handleSave} initial={modalEntry}/>}
          {(modalType==="vitamin"||modalType==="bath"||modalType==="mood"||modalType==="note"||modalType==="nombril"||modalType==="nez")&&<SimpleForm cat={modalType} color={CATS[modalType].color} onSave={handleSave} initial={modalEntry}/>}
          {modalType==="import"&&<ImportForm onImport={importEntries}/>}
        </div>
      </div>
    )}
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
