function pad(n){return String(n).padStart(2,"0");}
function localNow(){const d=new Date();return`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;}
function localHoursBefore(h){const d=new Date(Date.now()-h*3600000);return`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;}
function isoToLocal(iso){const d=new Date(iso);return`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;}

function fmtTime(iso){return new Date(iso).toLocaleTimeString("fr-CH",{hour:"2-digit",minute:"2-digit",timeZone:"Europe/Zurich"});}
function fmtDate(iso){
  const d=new Date(iso),now=new Date();
  const ds=d.toLocaleDateString("fr-CH",{timeZone:"Europe/Zurich"});
  const ns=now.toLocaleDateString("fr-CH",{timeZone:"Europe/Zurich"});
  const ys=new Date(now-86400000).toLocaleDateString("fr-CH",{timeZone:"Europe/Zurich"});
  if(ds===ns)return"Aujourd'hui";if(ds===ys)return"Hier";
  return d.toLocaleDateString("fr-CH",{weekday:"short",day:"numeric",month:"short",timeZone:"Europe/Zurich"});
}
function fmtShortDate(iso){
  const d=new Date(iso);
  return`${pad(+d.toLocaleDateString("fr-CH",{day:"numeric",timeZone:"Europe/Zurich"}))}.${pad(+d.toLocaleDateString("fr-CH",{month:"numeric",timeZone:"Europe/Zurich"}))}`;
}
function durLabel(m){if(!m)return"";return m<60?`${m} min`:`${Math.floor(m/60)}h${pad(m%60)}`;}
function timeAgo(iso){
  const m=Math.round((Date.now()-new Date(iso))/60000);
  if(m<1)return"à l'instant";if(m<60)return`il y a ${m} min`;
  const h=Math.floor(m/60),rm=m%60;
  return rm>0?`il y a ${h}h${pad(rm)}`:`il y a ${h}h`;
}
function dateZH(iso){return new Date(iso).toLocaleDateString("fr-CH",{timeZone:"Europe/Zurich"});}
function todayZH(){return new Date().toLocaleDateString("fr-CH",{timeZone:"Europe/Zurich"});}
function groupByDay(entries){
  const g={};
  [...entries].sort((a,b)=>new Date(b.ts)-new Date(a.ts)).forEach(e=>{const k=dateZH(e.ts);if(!g[k])g[k]=[];g[k].push(e);});
  return g;
}
function groupFeeds(list){
  const feeds=[...list].filter(e=>e.cat==="feed").sort((a,b)=>new Date(a.ts)-new Date(b.ts));
  const sessions=[];let i=0;
  while(i<feeds.length){
    const cur=feeds[i];
    if(i+1<feeds.length){
      const nxt=feeds[i+1];
      const diff=(new Date(nxt.ts)-new Date(cur.ts))/60000;
      const sides=new Set([cur.side,nxt.side]);
      if(diff<=30&&sides.has("Gauche")&&sides.has("Droit")){sessions.push({...cur,side:"Les deux",_merged:true});i+=2;continue;}
    }
    sessions.push(cur);i++;
  }
  return sessions;
}
function checkMorningSoins(entries){
  const today=todayZH();
  const te=entries.filter(e=>dateZH(e.ts)===today);
  return{
    vitDone:te.some(e=>e.cat==="vitamin"&&e.vitaminDone),
    nombrilDone:te.some(e=>e.cat==="nombril"),
    probioticDone:te.some(e=>e.cat==="probiotic"),
  };
}
function calcNightDuration(allEntries){
  function longestPause(ws,we){
    const inW=allEntries.filter(e=>{const t=new Date(e.ts);return t>=ws&&t<=we;}).sort((a,b)=>new Date(a.ts)-new Date(b.ts));
    if(inW.length<2)return null;
    let max=0;
    for(let i=1;i<inW.length;i++){const g=(new Date(inW[i].ts)-new Date(inW[i-1].ts))/60000;if(g>max)max=g;}
    return max>=60?Math.round(max):null;
  }
  const now=new Date();
  const ws0=new Date(now);ws0.setHours(20,0,0,0);if(ws0>now)ws0.setDate(ws0.getDate()-1);
  const we0=new Date(ws0);we0.setDate(we0.getDate()+1);we0.setHours(11,0,0,0);
  const cur=longestPause(ws0,we0);if(cur)return cur;
  const ws1=new Date(ws0);ws1.setDate(ws1.getDate()-1);
  const we1=new Date(we0);we1.setDate(we1.getDate()-1);
  return longestPause(ws1,we1);
}

function EntryCard({entry,onDelete,onEdit}){
  const cat=CATS[entry.cat]||CATS.note;
  const[confirm,setConfirm]=useState(false);
  const parts=[];
  if(entry.side)parts.push(entry.side==="Les deux"?"Les deux seins":`Sein ${entry.side}`);
  if(entry.duration)parts.push(durLabel(entry.duration));
  if(entry.quantity)parts.push(`${entry.quantity} ml`);
  if(entry.weight)parts.push(`${entry.weight} kg`);
  if(entry.temp)parts.push(`${entry.temp} °C`);
  if(entry.pooColor)parts.push(entry.pooColor);
  if(entry.pooTex)parts.push(entry.pooTex);
  if(entry.mood)parts.push(entry.mood);
  if(entry.vitaminDone)parts.push("✓");
  if(entry.note)parts.push(entry.note);
  if(entry.author)parts.push(`— ${entry.author}`);
  return(<div style={{background:C.surface,borderRadius:14,border:`1px solid ${C.border}`,padding:"12px 16px",display:"flex",alignItems:"flex-start",gap:12,position:"relative"}}>
    <div style={{width:40,height:40,borderRadius:12,background:cat.bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>{cat.emoji}</div>
    <div style={{flex:1,minWidth:0}}>

        <span style={{fontWeight:700,fontSize:14}}>{cat.label}</span>
        <span style={{fontSize:12,color:C.muted}}>{fmtTime(entry.ts)}</span>
      </div>
      {parts.length>0&&<div style={{fontSize:13,color:C.muted,marginTop:3}}>{parts.join(" · ")}</div>}
    </div>
    <div style={{display:"flex",gap:4,flexShrink:0}}>
      <button onClick={()=>onEdit(entry)} style={{background:"none",border:"none",cursor:"pointer",color:C.muted,fontSize:16,padding:"0 3px"}}>✏️</button>
      <button onClick={()=>setConfirm(true)} style={{background:"none",border:"none",cursor:"pointer",color:C.muted,fontSize:20,padding:"0 2px"}}>×</button>

}

  const groups=groupByDay(filtered);

          <div key={day}>

            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              {es.map(e=>{
                const cat=CATS[e.cat]||CATS.note;
                const parts=[];
                if(e.side)parts.push(e.side==="Les deux"?"Les deux seins":`Sein ${e.side}`);
                if(e.duration)parts.push(durLabel(e.duration));
                if(e.quantity)parts.push(`${e.quantity} ml`);
                if(e.weight)parts.push(`${e.weight} kg`);
                if(e.pooColor)parts.push(e.pooColor);
                if(e.pooTex)parts.push(e.pooTex);
                if(e.note)parts.push(e.note);
                return(<div key={e.id} style={{position:"relative"}}>
                  <div style={{display:"flex",alignItems:"center",gap:10,padding:"8px 10px",background:cat.bg,borderRadius:10}}>

                    {parts.length>0&&<span style={{fontSize:12,color:C.muted,flex:1,minWidth:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{parts.join(" · ")}</span>}

                      <button onClick={()=>{onEdit(e);onClose();}} style={{background:"none",border:"none",cursor:"pointer",color:C.muted,fontSize:15,padding:"0 3px"}}>✏️</button>
                      <button onClick={()=>setConfirm(e.id)} style={{background:"none",border:"none",cursor:"pointer",color:C.muted,fontSize:18,padding:"0 2px"}}>×</button>
                    </div>
                  </div>
                  {confirm===e.id&&<div style={{position:"absolute",inset:0,background:"rgba(253,247,244,0.97)",borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",gap:10,zIndex:10}}>
                    <span style={{fontSize:13}}>Supprimer ?</span>
                    <button onClick={()=>{onDelete(e.id);setConfirm(null);}} style={{background:C.accent,color:"#fff",border:"none",borderRadius:8,padding:"6px 14px",fontWeight:700,cursor:"pointer"}}>Oui</button>
                    <button onClick={()=>setConfirm(null)} style={{background:C.muted,color:"#fff",border:"none",borderRadius:8,padding:"6px 14px",fontWeight:700,cursor:"pointer"}}>Non</button>
                  </div>}
                </div>);
              })}
            </div>
          </div>
        ))}
      </div>
    </div>
  </div>);
}

function TodayStats({entries,onEdit,onDelete}){
  const[,setTick]=useState(0);
  const[miniJournal,setMiniJournal]=useState(null);
  useEffect(()=>{
    function onVisible(){if(document.visibilityState==="visible")setTick(t=>t+1);}
    document.addEventListener("visibilitychange",onVisible);
    return()=>document.removeEventListener("visibilitychange",onVisible);
  },[]);
  const now=new Date();
  const since=new Date(now.getTime()-24*3600000);
  const te=entries.filter(e=>new Date(e.ts)>=since);
  const feedSessions=groupFeeds(te);
  const wet=te.filter(e=>e.cat==="diaper_wet"||e.cat==="diaper_both").length;
  const poo=te.filter(e=>e.cat==="diaper_poo"||e.cat==="diaper_both").length;
  const lastFeed=entries.filter(e=>e.cat==="feed").sort((a,b)=>new Date(b.ts)-new Date(a.ts))[0];
  const lastWet=entries.filter(e=>e.cat==="diaper_wet"||e.cat==="diaper_both").sort((a,b)=>new Date(b.ts)-new Date(a.ts))[0];
  const lastPoo=entries.filter(e=>e.cat==="diaper_poo"||e.cat==="diaper_both").sort((a,b)=>new Date(b.ts)-new Date(a.ts))[0];
  const lastW=entries.filter(e=>e.cat==="weight").sort((a,b)=>new Date(b.ts)-new Date(a.ts))[0];
  const nightMin=calcNightDuration(entries);
  const{vitDone,nombrilDone,probioticDone}=checkMorningSoins(entries);

  const SC=({emoji,label,value,sub,color,bg,cats})=>(

  );

    <div style={{display:"flex",alignItems:"baseline",justifyContent:"space-between"}}>
      <div style={{fontSize:12,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:1}}>Dernières 24h</div>
      <div style={{fontSize:13,fontWeight:600,color:C.accent}}>🕐 {heure}</div>
    </div>
    <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
      {[
        {done:vitDone,   emoji:"💊",label:"Vitamines"},
        {done:probioticDone,emoji:"🦠",label:"Probiotic"},
        {done:nombrilDone,emoji:"🌀",label:"Nombril"},
      ].map(({done,emoji,label})=>(
        <div key={label} style={{flex:1,minWidth:90,background:done?C.sageLight:C.redLight,borderRadius:12,padding:"7px 10px",fontSize:11,fontWeight:700,color:done?C.sage:C.red,textAlign:"center"}}>
          {emoji} {label} {done?"✓":"⚠️"}
        </div>
      ))}
    </div>
    <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
      <SC emoji="🤱" label="Allaitements" value={feedSessions.length} sub={lastFeed?timeAgo(lastFeed.ts):null} color={C.accent} bg={C.accentLight} cats={["feed"]}/>
      <SC emoji="💧" label="Pipi" value={wet} sub={lastWet?timeAgo(lastWet.ts):null} color={C.sky} bg={C.skyLight} cats={["diaper_wet","diaper_both"]}/>
      <SC emoji="💩" label="Caca" value={poo} sub={lastPoo?timeAgo(lastPoo.ts):null} color={C.golden} bg={C.goldenLight} cats={["diaper_poo","diaper_both"]}/>
      <SC emoji="🌙" label="Nuit" value={nightMin?durLabel(nightMin):"—"} color={C.lavender} bg={C.lavenderLight}/>
      {lastW&&<SC emoji="⚖️" label="Poids" value={`${lastW.weight} kg`} color={C.sage} bg={C.sageLight} cats={["weight"]}/>}
    </div>
    {miniJournal&&<MiniJournal entries={entries} cats={miniJournal.cats} title={miniJournal.title} onClose={()=>setMiniJournal(null)} onEdit={onEdit} onDelete={onDelete}/>}

}

function WeightChart({entries}){
  const ws=entries.filter(e=>e.cat==="weight").sort((a,b)=>new Date(a.ts)-new Date(b.ts));
  if(ws.length<2)return<div style={{color:C.muted,textAlign:"center",padding:"40px 0"}}>Ajoutez au moins 2 pesées.</div>;
  const PX=48,PY=24,PB=28,H=220;
  const t0=new Date(ws[0].ts).getTime(),t1=new Date(ws[ws.length-1].ts).getTime(),totalMs=t1-t0||1;
  const W=Math.max(300,Math.max(ws.length*60,(typeof window!=="undefined"?window.innerWidth:400)-32));
  const innerW=W-PX*2,innerH=H-PY-PB;
  const minW=Math.min(...ws.map(e=>e.weight))-0.05,maxW=Math.max(...ws.map(e=>e.weight))+0.05;
  const toX=ts=>PX+((new Date(ts).getTime()-t0)/totalMs)*innerW;
  const toY=w=>PY+(1-(w-minW)/(maxW-minW))*innerH;
  const pts=ws.map(e=>({x:toX(e.ts),y:toY(e.weight),w:e.weight,ts:e.ts}));
  const path=pts.map((p,i)=>`${i===0?"M":"L"}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(" ");
  const area=`${path} L${pts[pts.length-1].x},${PY+innerH} L${pts[0].x},${PY+innerH} Z`;
  const yVals=Array.from({length:5},(_,i)=>minW+(maxW-minW)*i/4);
  return(<div>
    <div style={{fontSize:12,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:1,marginBottom:12}}>Courbe de poids</div>
    <div style={{overflowX:"auto",WebkitOverflowScrolling:"touch",margin:"0 -16px",padding:"0 16px"}}>
      <svg viewBox={`0 0 ${W} ${H}`} style={{width:W,minWidth:W,height:H,display:"block"}}>
        <rect width={W} height={H} fill={C.bg} rx={14}/>
        {yVals.map((v,i)=>(<g key={i}><line x1={PX} y1={toY(v)} x2={W-PX} y2={toY(v)} stroke={C.border} strokeDasharray="4 3" strokeWidth={0.8}/><text x={PX-6} y={toY(v)+4} fontSize={9} fill={C.muted} textAnchor="end">{v.toFixed(3)}</text></g>))}
        <path d={area} fill={C.sage} fillOpacity={0.08}/>
        <path d={path} fill="none" stroke={C.sage} strokeWidth={2.5} strokeLinejoin="round" strokeLinecap="round"/>
        {pts.map((p,i)=>(<g key={i}><circle cx={p.x} cy={p.y} r={5} fill={C.sage} stroke="#fff" strokeWidth={1.5}/><text x={p.x} y={p.y-11} fontSize={10} fill={C.sage} textAnchor="middle" fontWeight={700}>{p.w.toFixed(3)}</text><text x={p.x} y={H-8} fontSize={9} fill={C.muted} textAnchor="middle">{fmtShortDate(p.ts)}</text></g>))}
      </svg>
    </div>
  </div>);
}

function PDFReport({data,onClose}){
  const entries=data.entries;
  const weights=entries.filter(e=>e.cat==="weight").sort((a,b)=>new Date(a.ts)-new Date(b.ts));
  const now=new Date();
  function byDay(n){const days=[];for(let i=n-1;i>=0;i--){const d=new Date(now.getTime()-i*86400000);const k=d.toLocaleDateString("fr-CH",{timeZone:"Europe/Zurich"});days.push({k,d});}return days;}
  const days7=byDay(7);
  const statsRows=days7.map(({k,d})=>{
    const dayE=entries.filter(e=>dateZH(e.ts)===k);
    return{k,d,feeds:groupFeeds(dayE).length,wet:dayE.filter(e=>e.cat==="diaper_wet"||e.cat==="diaper_both").length,poo:dayE.filter(e=>e.cat==="diaper_poo"||e.cat==="diaper_both").length,vit:dayE.some(e=>e.cat==="vitamin"&&e.vitaminDone),prob:dayE.some(e=>e.cat==="probiotic"),nom:dayE.some(e=>e.cat==="nombril"),label:d.toLocaleDateString("fr-CH",{weekday:"short",day:"numeric",month:"short"})};
  });
  const minW=weights.length?Math.min(...weights.map(e=>e.weight)):null;
  const lastW=weights.length?weights[weights.length-1]:null;
  const firstW=weights.length?weights[0]:null;
  const weightGain=minW&&lastW?Math.round((lastW.weight-minW)*1000):null;
  const minWEntry=weights.find(e=>e.weight===minW);
  const daysSince=minWEntry&&lastW?Math.round((new Date(lastW.ts)-new Date(minWEntry.ts))/86400000):null;
  const dailyGain=weightGain&&daysSince?Math.round(weightGain/daysSince):null;
  const allFS=groupFeeds(entries.filter(e=>e.cat==="feed")).sort((a,b)=>new Date(a.ts)-new Date(b.ts));
  const feedGaps=allFS.slice(1).map((e,i)=>(new Date(e.ts)-new Date(allFS[i].ts))/60000).filter(g=>g>30&&g<480);
  const avgGap=feedGaps.length?Math.round(feedGaps.reduce((s,x)=>s+x,0)/feedGaps.length):null;
  const nightFeeds=entries.filter(e=>{if(e.cat!=="feed")return false;const h=new Date(e.ts).getHours();return h>=22||h<6;});
  const avgNF=Math.round(nightFeeds.length/7*10)/10;
  const vitDays=days7.filter(({k})=>entries.some(e=>e.cat==="vitamin"&&e.vitaminDone&&dateZH(e.ts)===k)).length;
  const probDays=days7.filter(({k})=>entries.some(e=>e.cat==="probiotic"&&dateZH(e.ts)===k)).length;
  const nombrilDays=days7.filter(({k})=>entries.some(e=>e.cat==="nombril"&&dateZH(e.ts)===k)).length;

  const maxVal=Math.max(...statsRows.map(r=>Math.max(r.feeds,r.wet,r.poo)),1);
  const W=520,H=110,PX=30,PY=8,PB=22,iH=H-PY-PB;
  const n=statsRows.length,barW=(W-PX*2-(n-1)*6)/n,subW=(barW-4)/3;

  function WeightSVG(){
    if(weights.length<2)return null;
    const W2=520,H2=140,PX2=52,PY2=14,PB2=24,iW=W2-PX2*2,iH2=H2-PY2-PB2;
    const t0=new Date(weights[0].ts).getTime(),t1=new Date(weights[weights.length-1].ts).getTime(),tot=t1-t0||1;
    const minWv=Math.min(...weights.map(e=>e.weight))-0.03,maxWv=Math.max(...weights.map(e=>e.weight))+0.03;
    const tx=ts=>PX2+((new Date(ts).getTime()-t0)/tot)*iW;
    const ty=w=>PY2+(1-(w-minWv)/(maxWv-minWv))*iH2;
    const pts=weights.map(e=>({x:tx(e.ts),y:ty(e.weight),w:e.weight,ts:e.ts}));
    const path=pts.map((p,i)=>`${i===0?"M":"L"}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(" ");
    const area=`${path} L${pts[pts.length-1].x},${PY2+iH2} L${pts[0].x},${PY2+iH2} Z`;
    return(<svg viewBox={`0 0 ${W2} ${H2}`} style={{width:"100%",display:"block"}}>
      <rect width={W2} height={H2} fill="#FBF7F4" rx={8}/>
      {Array.from({length:4},(_,i)=>minWv+(maxWv-minWv)*i/3).map((v,i)=>(
        <g key={i}><line x1={PX2} y1={ty(v)} x2={W2-PX2} y2={ty(v)} stroke="#E8DDD4" strokeDasharray="3 3"/><text x={PX2-4} y={ty(v)+4} fontSize={9} fill="#999" textAnchor="end">{v.toFixed(3)}</text></g>
      ))}
      <path d={area} fill="#7A9E87" fillOpacity={0.1}/>
      <path d={path} fill="none" stroke="#7A9E87" strokeWidth={2.5} strokeLinejoin="round" strokeLinecap="round"/>
      {pts.map((p,i)=>(<g key={i}>
        <circle cx={p.x} cy={p.y} r={5} fill="#7A9E87" stroke="white" strokeWidth={1.5}/>
        <text x={p.x} y={p.y-10} fontSize={9} fill="#7A9E87" textAnchor="middle" fontWeight="bold">{p.w.toFixed(3)}</text>
        <text x={p.x} y={H2-8} fontSize={8} fill="#999" textAnchor="middle">{fmtShortDate(p.ts)}</text>
      </g>))}
    </svg>);
  }

  const dateRange=`${days7[0].d.toLocaleDateString("fr-CH",{day:"numeric",month:"long"})} – ${days7[6].d.toLocaleDateString("fr-CH",{day:"numeric",month:"long",year:"numeric"})}`;
  const colors=["#C97A5A","#5A8EC9","#C9A05A"];

  return(<div style={{position:"fixed",inset:0,background:"#F0EAE4",zIndex:300,overflowY:"auto"}}>
    <div style={{background:C.surface,borderBottom:`1px solid ${C.border}`,padding:"12px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:10}}>
      <button onClick={onClose} style={{background:"none",border:`1.5px solid ${C.border}`,borderRadius:8,padding:"6px 14px",cursor:"pointer",fontWeight:700,color:C.muted,fontSize:13}}>← Retour</button>
      <span style={{fontWeight:700,color:C.accent,fontSize:15}}>📄 Aperçu rapport</span>
      <button onClick={()=>window.print()} style={{background:C.accent,color:"#fff",border:"none",borderRadius:8,padding:"6px 14px",cursor:"pointer",fontWeight:700,fontSize:13}}>🖨️ Imprimer</button>
    </div>
    <div id="pdf-page" style={{background:"white",maxWidth:680,margin:"20px auto",padding:"28px 36px",boxShadow:"0 4px 24px rgba(0,0,0,0.1)",borderRadius:8}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16,borderBottom:`2px solid ${C.accentLight}`,paddingBottom:12}}>
        <div>
          <div style={{fontSize:20,fontWeight:800,color:C.accent}}>🌸 Suivi de {data.babyName}</div>
          <div style={{fontSize:11,color:C.muted,marginTop:2}}>{dateRange}</div>
        </div>
        <div style={{textAlign:"right",fontSize:11,color:C.muted}}>
          {now.toLocaleDateString("fr-CH",{day:"numeric",month:"long",year:"numeric"})}<br/>
          {now.toLocaleTimeString("fr-CH",{hour:"2-digit",minute:"2-digit"})}
        </div>
      </div>

      <div style={{fontSize:12,fontWeight:700,color:C.accent,textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>📊 Activités — 7 jours</div>
      <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",display:"block",marginBottom:6}}>
        <rect width={W} height={H} fill="#FBF7F4" rx={8}/>
        {[0,Math.round(maxVal/2),maxVal].map((v,i)=>{const y=PY+(1-v/maxVal)*iH;return(<g key={i}><line x1={PX} y1={y} x2={W-PX} y2={y} stroke="#E8DDD4" strokeDasharray="3 3"/><text x={PX-4} y={y+4} fontSize={8} fill="#999" textAnchor="end">{v}</text></g>);})}
        {statsRows.map((r,i)=>{
          const x0=PX+i*(barW+6);
          return(<g key={i}>
            {[r.feeds,r.wet,r.poo].map((v,j)=>{const bh=Math.max(v/maxVal*iH,v?2:0);const bx=x0+j*(subW+1);return(<g key={j}><rect x={bx} y={PY+iH-bh} width={subW} height={bh} fill={colors[j]} rx={2} opacity={0.85}/>{v>0&&<text x={bx+subW/2} y={PY+iH-bh-2} fontSize={7} fill={colors[j]} textAnchor="middle" fontWeight="bold">{v}</text>}</g>);})}
            <text x={x0+barW/2} y={H-6} fontSize={8} fill="#7A6A5A" textAnchor="middle">{r.label.split(" ").slice(0,2).join(" ")}</text>
          </g>);
        })}
        {["Allait.","Pipi","Caca"].map((l,i)=>(<g key={i}><rect x={PX+i*68} y={H-14} width={8} height={8} fill={colors[i]} rx={1}/><text x={PX+i*68+11} y={H-7} fontSize={8} fill="#7A6A5A">{l}</text></g>))}
      </svg>

      <table style={{width:"100%",borderCollapse:"collapse",fontSize:11,marginBottom:14}}>
        <thead><tr style={{background:C.accentLight}}>
          <th style={{padding:"5px 8px",textAlign:"left"}}>Jour</th>
          <th style={{padding:"5px 8px",textAlign:"center"}}>🤱</th>
          <th style={{padding:"5px 8px",textAlign:"center"}}>💧</th>
          <th style={{padding:"5px 8px",textAlign:"center"}}>💩</th>
          <th style={{padding:"5px 8px",textAlign:"center"}}>💊</th>
          <th style={{padding:"5px 8px",textAlign:"center"}}>🦠</th>
          <th style={{padding:"5px 8px",textAlign:"center"}}>🌀</th>
        </tr></thead>
        <tbody>
          {statsRows.map((r,i)=>(<tr key={i} style={{background:i%2===0?"#FBF7F4":"white"}}>
            <td style={{padding:"4px 8px",fontWeight:600}}>{r.label}</td>
            <td style={{padding:"4px 8px",textAlign:"center"}}>{r.feeds}</td>
            <td style={{padding:"4px 8px",textAlign:"center"}}>{r.wet}</td>
            <td style={{padding:"4px 8px",textAlign:"center"}}>{r.poo}</td>
            <td style={{padding:"4px 8px",textAlign:"center",color:r.vit?C.sage:C.red,fontWeight:700}}>{r.vit?"✓":"✗"}</td>

            <td style={{padding:"4px 8px",textAlign:"center",color:r.nom?C.sage:C.red,fontWeight:700}}>{r.nom?"✓":"✗"}</td>

            <td style={{padding:"4px 8px",textAlign:"center"}}>{Math.round(statsRows.reduce((s,r)=>s+r.wet,0)/7*10)/10}</td>

        <div style={{background:"#FBF7F4",borderRadius:8,padding:"7px 10px",borderLeft:`3px solid ${probDays<7?C.red:C.sage}`,fontSize:11}}>🦠 Probiotic : <strong style={{color:probDays<7?C.red:C.sage}}>{probDays}/7 j</strong></div>
        <div style={{background:"#FBF7F4",borderRadius:8,padding:"7px 10px",borderLeft:`3px solid ${nombrilDays<7?C.red:C.sage}`,fontSize:11}}>🌀 Nombril : <strong style={{color:nombrilDays<7?C.red:C.sage}}>{nombrilDays}/7 j</strong></div>
        {weightGain!=null&&<div style={{background:"#FBF7F4",borderRadius:8,padding:"7px 10px",borderLeft:`3px solid ${C.sage}`,fontSize:11}}>⚖️ Reprise : <strong style={{color:C.sage}}>+{weightGain} g{dailyGain?` (${dailyGain} g/j)`:""}</strong></div>}
      </div>
    </div>
    <style>{`@media print{body>*:not(#pdf-page){display:none!important;}#pdf-page{margin:0!important;box-shadow:none!important;border-radius:0!important;max-width:100%!important;padding:12px 18px!important;}@page{size:A4;margin:8mm;}}`}</style>
  </div>);
}

function StatsTab({entries,data,onShowPDF}){
  const[,setTick]=useState(0);
  useEffect(()=>{
    function onVisible(){if(document.visibilityState==="visible")setTick(t=>t+1);}
    document.addEventListener("visibilitychange",onVisible);
    return()=>document.removeEventListener("visibilitychange",onVisible);
  },[]);
  const now=new Date();
  function byDay(n){const days=[];for(let i=n-1;i>=0;i--){const d=new Date(now.getTime()-i*86400000);const k=d.toLocaleDateString("fr-CH",{timeZone:"Europe/Zurich"});const label=i===0?"Auj.":i===1?"Hier":`${pad(d.getDate())}.${pad(d.getMonth()+1)}`;days.push({k,label,d});}return days;}
  const days7=byDay(7);
  const feedsByDay=days7.map(d=>({...d,v:groupFeeds(entries.filter(e=>dateZH(e.ts)===d.k)).length}));
  const wetByDay=days7.map(d=>({...d,v:entries.filter(e=>(e.cat==="diaper_wet"||e.cat==="diaper_both")&&dateZH(e.ts)===d.k).length}));
  const pooByDay=days7.map(d=>({...d,v:entries.filter(e=>(e.cat==="diaper_poo"||e.cat==="diaper_both")&&dateZH(e.ts)===d.k).length}));
  const avg=arr=>arr.length?Math.round(arr.reduce((s,x)=>s+x,0)/arr.length*10)/10:0;
  const allFS=groupFeeds(entries.filter(e=>e.cat==="feed")).sort((a,b)=>new Date(a.ts)-new Date(b.ts));
  const feedGaps=allFS.slice(1).map((e,i)=>(new Date(e.ts)-new Date(allFS[i].ts))/60000).filter(g=>g>30&&g<480);
  const avgGap=feedGaps.length?Math.round(feedGaps.reduce((s,x)=>s+x,0)/feedGaps.length):null;
  const weights=entries.filter(e=>e.cat==="weight").sort((a,b)=>new Date(a.ts)-new Date(b.ts));
  const minW=weights.length?Math.min(...weights.map(e=>e.weight)):null;
  const lastW=weights.length?weights[weights.length-1]:null;
  const weightGain=minW&&lastW?Math.round((lastW.weight-minW)*1000):null;
  const minWEntry=weights.find(e=>e.weight===minW);
  const daysSince=minWEntry&&lastW?Math.round((new Date(lastW.ts)-new Date(minWEntry.ts))/86400000):null;
  const dailyGain=weightGain&&daysSince?Math.round(weightGain/daysSince):null;
  const nightFeeds=entries.filter(e=>{if(e.cat!=="feed")return false;const h=new Date(e.ts).getHours();return h>=22||h<6;});
  const nightByDay=days7.map(d=>({...d,v:nightFeeds.filter(e=>dateZH(e.ts)===d.k).length}));
  const avgNightFeeds=avg(nightByDay.map(d=>d.v));
  const vitDays=days7.filter(({k})=>entries.some(e=>e.cat==="vitamin"&&e.vitaminDone&&dateZH(e.ts)===k)).length;
  const probDays=days7.filter(({k})=>entries.some(e=>e.cat==="probiotic"&&dateZH(e.ts)===k)).length;
  const nombrilDays=days7.filter(({k})=>entries.some(e=>e.cat==="nombril"&&dateZH(e.ts)===k)).length;
  const e48a=entries.filter(e=>new Date(e.ts)>=new Date(now-48*3600000)&&new Date(e.ts)<new Date(now-24*3600000));
  const e48b=entries.filter(e=>new Date(e.ts)>=new Date(now-24*3600000));
  const trend=(cat,prev,curr)=>{const p=prev.filter(e=>e.cat===cat).length,c=curr.filter(e=>e.cat===cat).length;if(c>p)return{arrow:"↑",color:C.sage};if(c<p)return{arrow:"↓",color:C.red};return{arrow:"→",color:C.muted};};
  function calcNightDur(dayK,nextDayK){
    const inW=entries.filter(e=>{const h=new Date(e.ts).getHours();return(dateZH(e.ts)===dayK&&h>=20)||(dateZH(e.ts)===nextDayK&&h<11);}).sort((a,b)=>new Date(a.ts)-new Date(b.ts));
    if(inW.length<2)return null;
    let max=0;for(let i=1;i<inW.length;i++){const g=(new Date(inW[i].ts)-new Date(inW[i-1].ts))/60000;if(g>max)max=g;}
    return max>=60?Math.round(max):null;
  }
  const nightDurations=days7.map((d,i)=>{if(i===days7.length-1)return{...d,v:null};return{...d,v:calcNightDur(d.k,days7[i+1].k)};});
  const validNights=nightDurations.map(d=>d.v).filter(Boolean);
  const avgNightDur=validNights.length?Math.round(validNights.reduce((s,x)=>s+x,0)/validNights.length):null;

  function BarChart({data:bdata,color}){
    const m=Math.max(...bdata.map(d=>d.v),1);
    return(<div style={{display:"flex",alignItems:"flex-end",gap:4,height:60}}>
      {bdata.map((d,i)=>(<div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
        <div style={{fontSize:9,color:C.muted,fontWeight:600}}>{d.v||""}</div>
        <div style={{width:"100%",background:color,opacity:0.15+0.85*(d.v/m),borderRadius:"4px 4px 0 0",height:Math.max(d.v/m*44,d.v?4:0)}}/>
        <div style={{fontSize:8,color:C.muted,textAlign:"center",lineHeight:1.1}}>{d.label}</div>
      </div>))}
    </div>);
  }
  const Sec=({title,children})=>(<div style={{background:C.surface,borderRadius:16,padding:"16px",border:`1px solid ${C.border}`}}><div style={{fontSize:12,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:1,marginBottom:14}}>{title}</div>{children}</div>);
  const KV=({label,value,color})=>(<div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",paddingBottom:8,borderBottom:`1px solid ${C.border}`,marginBottom:8}}><span style={{fontSize:13,color:C.muted}}>{label}</span><span style={{fontSize:15,fontWeight:700,color:color||C.text}}>{value}</span></div>);

  return(<div style={{display:"flex",flexDirection:"column",gap:16}}>
    <button onClick={onShowPDF} style={{background:C.accent,color:"#fff",border:"none",borderRadius:12,padding:"12px",fontWeight:700,fontSize:14,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>📄 Générer le rapport PDF</button>
    <Sec title="📈 Tendances (24h vs veille)">
      <div style={{display:"flex",gap:10}}>
        {[["🤱","Allaitement",trend("feed",e48a,e48b)],["💧","Pipi",trend("diaper_wet",e48a,e48b)],["💩","Caca",trend("diaper_poo",e48a,e48b)]].map(([emoji,label,t])=>(
          <div key={label} style={{flex:1,background:C.bg,borderRadius:12,padding:"10px 8px",textAlign:"center"}}>
            <div style={{fontSize:22}}>{emoji}</div>
            <div style={{fontSize:22,fontWeight:800,color:t.color}}>{t.arrow}</div>
            <div style={{fontSize:10,color:C.muted,fontWeight:600}}>{label}</div>
          </div>
        ))}
      </div>
    </Sec>
    <Sec title="📊 Moyennes sur 7 jours">
      <KV label="Allaitements / jour" value={avg(feedsByDay.map(d=>d.v))}/>
      <KV label="Pipi / jour" value={avg(wetByDay.map(d=>d.v))}/>
      <KV label="Caca / jour" value={avg(pooByDay.map(d=>d.v))}/>
      <KV label="Tétées nocturnes (22h-6h)" value={avgNightFeeds}/>
      {avgGap&&<KV label="Intervalle moyen entre tétées" value={durLabel(avgGap)}/>}
    </Sec>
    {avgNightDur&&<Sec title="🌙 Durée des nuits — 7 jours">
      <div style={{display:"flex",alignItems:"flex-end",gap:4,height:80,marginBottom:8}}>
        {nightDurations.map((d,i)=>{const m=Math.max(...nightDurations.map(x=>x.v||0),1);return(<div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
          <div style={{fontSize:9,color:C.muted,fontWeight:600}}>{d.v?durLabel(d.v):""}</div>
          <div style={{width:"100%",background:C.lavender,opacity:d.v?0.15+0.85*(d.v/m):0.08,borderRadius:"4px 4px 0 0",height:d.v?Math.max(d.v/m*60,4):3}}/>
          <div style={{fontSize:8,color:C.muted,textAlign:"center",lineHeight:1.1}}>{d.label}</div>
        </div>);
        })}
      </div>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:13}}>
        <span style={{color:C.muted}}>Moyenne</span>
        <span style={{fontWeight:700,color:C.lavender}}>{durLabel(avgNightDur)}</span>
      </div>
    </Sec>}
    <Sec title="🤱 Allaitements par jour"><BarChart data={feedsByDay} color={C.accent}/></Sec>
    <Sec title="💧 Pipi par jour"><BarChart data={wetByDay} color={C.sky}/></Sec>
    <Sec title="💩 Caca par jour"><BarChart data={pooByDay} color={C.golden}/></Sec>
    {weights.length>=2&&<Sec title="⚖️ Croissance">
      <KV label="Poids initial" value={`${weights[0].weight} kg`}/>
      <KV label="Poids minimum" value={`${minW} kg`} color={C.red}/>
      <KV label="Poids actuel" value={`${lastW.weight} kg`} color={C.sage}/>
      {weightGain!=null&&<KV label="Prise de poids totale" value={`+${weightGain} g`} color={C.sage}/>}
      {dailyGain&&<KV label="Gain moyen / jour" value={`+${dailyGain} g`} color={dailyGain>=15&&dailyGain<=40?C.sage:C.golden}/>}
    </Sec>}
    <Sec title="💊 Soins — 7 derniers jours">
      <KV label="Vitamines" value={`${vitDays}/7 jours`} color={vitDays>=6?C.sage:vitDays>=4?C.golden:C.red}/>
      <KV label="Probiotic" value={`${probDays}/7 jours`} color={probDays>=6?C.sage:probDays>=4?C.golden:C.red}/>
      <KV label="Nombril désinfecté" value={`${nombrilDays}/7 jours`} color={nombrilDays>=6?C.sage:nombrilDays>=4?C.golden:C.red}/>
    </Sec>
    <Sec title="✨ Faits marquants">
      {weightGain!=null&&<div style={{background:C.sageLight,borderRadius:10,padding:"10px 12px",fontSize:13,color:C.sage,marginBottom:8}}>⚖️ Rose a pris <strong>{weightGain} g</strong> depuis le minimum{dailyGain?` (${dailyGain} g/jour)`:""}</div>}
      {avgGap&&<div style={{background:C.accentLight,borderRadius:10,padding:"10px 12px",fontSize:13,color:C.accent,marginBottom:8}}>🤱 Intervalle moyen entre tétées : <strong>{durLabel(avgGap)}</strong></div>}
      {avgNightFeeds>0&&<div style={{background:C.lavenderLight,borderRadius:10,padding:"10px 12px",fontSize:13,color:C.lavender,marginBottom:8}}>🌙 <strong>{avgNightFeeds}</strong> tétée{avgNightFeeds>1?"s":""} nocturne{avgNightFeeds>1?"s":""} par nuit</div>}
      {vitDays<7&&<div style={{background:C.redLight,borderRadius:10,padding:"10px 12px",fontSize:13,color:C.red,marginBottom:8}}>💊 Vitamines oubliées <strong>{7-vitDays} jour{7-vitDays>1?"s":""}</strong> cette semaine</div>}
      {probDays<7&&<div style={{background:C.redLight,borderRadius:10,padding:"10px 12px",fontSize:13,color:C.red,marginBottom:8}}>🦠 Probiotic oublié <strong>{7-probDays} jour{7-probDays>1?"s":""}</strong> cette semaine</div>}
    </Sec>
  </div>);
}

function Settings({data,onUpdate,syncStatus}){
  const[name,setName]=useState(data.babyName);
  const[birth,setBirth]=useState(data.birthDate);
  const[author,setAuthor]=useState(()=>{try{return localStorage.getItem("bt_author")||"";}catch{return"";}});
  function saveAuthor(v){setAuthor(v);try{localStorage.setItem("bt_author",v);}catch{}}
  const sc={ok:{bg:C.sageLight,c:C.sage,t:"✓ Synchronisé avec Firebase"},syncing:{bg:"#FFF8E1",c:C.golden,t:"🔄 Synchronisation…"},error:{bg:C.redLight,c:C.red,t:"⚠️ Erreur de connexion"},offline:{bg:"#F5F5F5",c:C.muted,t:"📴 Mode hors ligne"}}[syncStatus]||{};
  return(<div style={{display:"flex",flexDirection:"column",gap:18}}>
    <div style={{background:sc.bg,borderRadius:12,padding:"12px 16px",fontSize:13,color:sc.c,fontWeight:600}}>{sc.t}</div>
    <Inp label="Prénom du bébé" value={name} onChange={e=>setName(e.target.value)}/>
    <Inp label="Date de naissance" type="date" value={birth} onChange={e=>setBirth(e.target.value)}/>
    <Inp label="Votre prénom" value={author} onChange={e=>saveAuthor(e.target.value)} placeholder="ex: Papa"/>
    <Btn color={C.accent} onClick={()=>onUpdate({babyName:name,birthDate:birth})}>Sauvegarder</Btn>
    <hr style={{border:"none",borderTop:`1px solid ${C.border}`}}/>
    <div style={{fontSize:13,color:C.muted}}><strong>{data.entries.length}</strong> entrées</div>
  </div>);
}

function App(){
  const[data,setData]=useState(DEFAULT);
  const[tab,setTab]=useState("home");
  const[modal,setModal]=useState(null);
  const[syncStatus,setSyncStatus]=useState("syncing");
  const[showPDF,setShowPDF]=useState(false);
  const saveTimer=useRef(null);

  useEffect(()=>{
    fbRead().then(remote=>{
      if(remote&&remote.entries&&remote.entries.length>0){setData(remote);setSyncStatus("ok");}
      else{fbWrite(DEFAULT).then(()=>setSyncStatus("ok"));}
    }).catch(()=>setSyncStatus("offline"));
  },[]);

  useEffect(()=>{
    function syncNow(){
      fbRead().then(remote=>{
        if(!remote)return;
        setData(prev=>{
          const ids=new Set(prev.entries.map(e=>e.id));
          const newE=remote.entries.filter(e=>!ids.has(e.id));
          if(!newE.length&&remote.babyName===prev.babyName)return prev;
          return{...remote,entries:[...prev.entries,...newE].sort((a,b)=>new Date(b.ts)-new Date(a.ts))};
        });
        setSyncStatus("ok");
      }).catch(()=>setSyncStatus("offline"));
    }
    function onVisible(){if(document.visibilityState==="visible")syncNow();}
    document.addEventListener("visibilitychange",onVisible);
    const id=setInterval(()=>{if(document.visibilityState==="visible")syncNow();},2*60*1000);
    return()=>{document.removeEventListener("visibilitychange",onVisible);clearInterval(id);};
  },[]);

  function persist(next){setData(next);setSyncStatus("syncing");clearTimeout(saveTimer.current);saveTimer.current=setTimeout(()=>{fbWrite(next).then(()=>setSyncStatus("ok")).catch(()=>setSyncStatus("error"));},800);}
  const author=()=>{try{return localStorage.getItem("bt_author")||"";}catch{return"";}};
  function addEntry(payload){const entry={id:Date.now()+Math.random(),...payload,author:author()||undefined};persist({...data,entries:[entry,...data.entries]});setModal(null);}
  function editEntry(payload){persist({...data,entries:data.entries.map(e=>e.id===modal.entry.id?{...e,...payload}:e)});setModal(null);}
  function deleteEntry(id){persist({...data,entries:data.entries.filter(e=>e.id!==id)});}
  function updateMeta(patch){persist({...data,...patch});}
  const isEditing=modal&&modal.entry;
  const mType=modal?.type,mEntry=modal?.entry;
  function handleSave(p){isEditing?editEntry(p):addEntry(p);}
  function openModal(cat){setModal({type:cat});}
  function openEdit(entry){setModal({type:entry.cat,entry});}

  function ageLabel(){
    if(!data.birthDate)return null;
    const days=Math.floor((Date.now()-new Date(data.birthDate))/86400000);
    if(days<=30)return`${days} jour${days>1?"s":""}`;
    if(days<56)return`${Math.floor(days/7)} semaine${Math.floor(days/7)>1?"s":""}`;
    return`${Math.floor(days/30)} mois`;
  }

  const QUICK=[
    "feed","diaper_wet","diaper_poo","diaper_both",
    "sleep","vitamin","probiotic","nombril",
    "nez","pump","weight","temperature","bath","note",
  ];
  const SIMPLE_CATS=["vitamin","bath","mood","note","nombril","nez","probiotic"];
  const sorted=[...data.entries].sort((a,b)=>new Date(b.ts)-new Date(a.ts));
  const syncDot={ok:"🟢",syncing:"🟡",error:"🔴",offline:"⚫"}[syncStatus]||"🟡";

  return(<div style={{background:C.bg,minHeight:"100vh",color:C.text}}>
    {showPDF&&<PDFReport data={data} onClose={()=>setShowPDF(false)}/>}
    <div style={{background:C.surface,borderBottom:`1px solid ${C.border}`,padding:"14px 20px 12px",position:"sticky",top:0,zIndex:40}}>
      <div style={{maxWidth:480,margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div>
          <div style={{fontSize:20,fontWeight:800,color:C.accent}}>🌸 {data.babyName}</div>
          {ageLabel()&&<div style={{fontSize:12,color:C.muted,marginTop:2}}>{ageLabel()}</div>}
        </div>
        <span style={{fontSize:18}}>{syncDot}</span>
      </div>
    </div>
    <div style={{maxWidth:480,margin:"0 auto",padding:"20px 16px 100px"}}>
      {tab==="home"&&(<div style={{display:"flex",flexDirection:"column",gap:24}}>
        <TodayStats entries={data.entries} onEdit={openEdit} onDelete={deleteEntry}/>
        <div>
          <div style={{fontSize:12,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:1,marginBottom:12}}>Ajouter</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8}}>
            {QUICK.map(cat=>{const c=CATS[cat];return(
              <button key={cat} onClick={()=>openModal(cat)} style={{background:C.surface,border:`1.5px solid ${C.border}`,borderRadius:14,padding:"10px 4px 8px",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
                <span style={{fontSize:22}}>{c.emoji}</span>
                <span style={{fontSize:10,color:C.muted,fontWeight:600,textAlign:"center",lineHeight:1.2}}>{c.label}</span>
              </button>
            );})}
          </div>
        </div>
        {sorted.length>0&&(<div>
          <div style={{fontSize:12,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>Récent</div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>{sorted.slice(0,5).map(e=><EntryCard key={e.id} entry={e} onDelete={deleteEntry} onEdit={openEdit}/>)}</div>
          {sorted.length>5&&<button onClick={()=>setTab("journal")} style={{background:"none",border:"none",color:C.accent,fontWeight:700,cursor:"pointer",marginTop:8,fontSize:14}}>Voir tout le journal →</button>}
        </div>)}
      </div>)}
      {tab==="journal"&&<Journal entries={data.entries} onDelete={deleteEntry} onEdit={openEdit}/>}
      {tab==="stats"&&<StatsTab entries={data.entries} data={data} onShowPDF={()=>setShowPDF(true)}/>}
      {tab==="weight"&&<WeightChart entries={data.entries}/>}
      {tab==="settings"&&<Settings data={data} onUpdate={updateMeta} syncStatus={syncStatus}/>}
    </div>
    <div style={{position:"fixed",bottom:0,left:0,right:0,background:C.surface,borderTop:`1px solid ${C.border}`,display:"flex",justifyContent:"space-around",padding:"8px 0 20px",zIndex:50}}>
      {[["home","🏠","Accueil"],["journal","📋","Journal"],["stats","📊","Stats"],["weight","📈","Courbe"],["settings","⚙️","Réglages"]].map(([t,emoji,label])=>(
        <button key={t} onClick={()=>setTab(t)} style={{background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,color:tab===t?C.accent:C.muted,fontWeight:tab===t?700:400,fontSize:11}}>
          <span style={{fontSize:22}}>{emoji}</span>{label}
        </button>
      ))}
    </div>
    {modal&&(
      <div style={{position:"fixed",inset:0,background:"rgba(45,33,24,0.45)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:100}} onClick={e=>{if(e.target===e.currentTarget)setModal(null);}}>
        <div style={{background:C.surface,borderRadius:"20px 20px 0 0",padding:"20px 20px 40px",width:"100%",maxWidth:480,height:"80vh",overflowY:"auto",WebkitOverflowScrolling:"touch"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
            <div style={{fontSize:18,fontWeight:800}}>{isEditing?"✏️ Modifier":<>{CATS[mType]?.emoji} {CATS[mType]?.label}</>}</div>
            <button onClick={()=>setModal(null)} style={{background:"none",border:"none",fontSize:24,cursor:"pointer",color:C.muted}}>×</button>
          </div>
          {mType==="feed"&&<FeedForm onSave={handleSave} initial={mEntry}/>}
          {mType==="pump"&&<PumpForm onSave={handleSave} initial={mEntry}/>}
          {(mType==="diaper_wet"||mType==="diaper_poo"||mType==="diaper_both")&&<DiaperForm type={mType} onSave={handleSave} initial={mEntry}/>}
          {mType==="sleep"&&<SleepForm onSave={handleSave} initial={mEntry}/>}
          {mType==="weight"&&<WeightForm onSave={handleSave} initial={mEntry}/>}
          {mType==="temperature"&&<TempForm onSave={handleSave} initial={mEntry}/>}
          {SIMPLE_CATS.includes(mType)&&<SimpleForm cat={mType} color={CATS[mType].color} onSave={handleSave} initial={mEntry}/>}
        </div>
      </div>
    )}
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
