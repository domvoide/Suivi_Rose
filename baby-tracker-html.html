function fmtTime(iso){return new Date(iso).toLocaleTimeString("fr-CH",{hour:"2-digit",minute:"2-digit",timeZone:"Europe/Zurich"});}
function fmtDate(iso){
  const d=new Date(iso), now=new Date();
  const ds=d.toLocaleDateString("fr-CH",{timeZone:"Europe/Zurich"});
  const ns=now.toLocaleDateString("fr-CH",{timeZone:"Europe/Zurich"});
  const ys=new Date(now-86400000).toLocaleDateString("fr-CH",{timeZone:"Europe/Zurich"});
  if(ds===ns)return"Aujourd'hui"; if(ds===ys)return"Hier";
  return d.toLocaleDateString("fr-CH",{weekday:"short",day:"numeric",month:"short",timeZone:"Europe/Zurich"});
}
function durLabel(m){if(!m)return"";return m<60?`${m} min`:`${Math.floor(m/60)}h${String(m%60).padStart(2,"0")}`;}

function groupByDay(entries){
  const g={};
  [...entries].sort((a,b)=>new Date(b.ts)-new Date(a.ts)).forEach(e=>{
    const k=dateZH(e.ts); if(!g[k])g[k]=[]; g[k].push(e);
  });
  return g;
}

function ImportForm({onImport}){
  const[date,setDate]=useState(localNow().slice(0,10));
  const[rows,setRows]=useState([{time:"",type:"feed",side:"Gauche",note:""}]);

  function addRow(){setRows(r=>[...r,{time:"",type:"feed",side:"Gauche",note:""}]);}
  function removeRow(i){setRows(r=>r.filter((_,j)=>j!==i));}
  function updateRow(i,k,v){setRows(r=>r.map((row,j)=>j===i?{...row,[k]:v}:row));}

  function doImport(){
    const entries=[];
    rows.forEach((row,i)=>{
      if(!row.time)return;
      const ts=new Date(`${date}T${row.time}:00+02:00`).toISOString();
      const id=Date.now()+i+Math.random();
      if(row.type==="feed"){
        entries.push({id,cat:"feed",side:row.side,note:row.note||undefined,ts,author:"carnet"});
      } else if(row.type==="pipi"){
        entries.push({id,cat:"diaper_wet",note:row.note||undefined,ts,author:"carnet"});
      } else if(row.type==="caca"){
        entries.push({id:id+0.1,cat:"diaper_poo",note:row.note||undefined,ts,author:"carnet"});
      } else if(row.type==="pipi+caca"){
        entries.push({id:id+0.2,cat:"diaper_wet",ts,author:"carnet"});
        entries.push({id:id+0.3,cat:"diaper_poo",ts,author:"carnet"});
      } else if(row.type==="vitamine"){
        entries.push({id,cat:"vitamin",vitaminDone:true,note:row.note||undefined,ts,author:"carnet"});
      } else if(row.type==="poids"){
        const w=parseFloat(row.note);
        if(!isNaN(w))entries.push({id,cat:"weight",weight:w,ts,author:"carnet"});
      } else if(row.type==="note"){
        entries.push({id,cat:"note",note:row.note||"",ts,author:"carnet"});
      }
    });
    if(entries.length>0){onImport(entries); setRows([{time:"",type:"feed",side:"Gauche",note:""}]);}
  }

  const types=[["feed","🤱 Allaitement"],["pipi","💧 Pipi"],["caca","💩 Caca"],["pipi+caca","💧💩 Pipi+Caca"],["vitamine","💊 Vitamine"],["poids","⚖️ Poids (kg)"],["note","📝 Note"]];

  return(<div style={{display:"flex",flexDirection:"column",gap:14}}>
    <Inp label="Date" type="date" value={date} onChange={e=>setDate(e.target.value)}/>
    {rows.map((row,i)=>(
      <div key={i} style={{background:C.bg,borderRadius:12,padding:12,border:`1px solid ${C.border}`,display:"flex",flexDirection:"column",gap:8}}>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <input type="time" value={row.time} onChange={e=>updateRow(i,"time",e.target.value)} style={{...iSt,width:110,flexShrink:0}}/>
          <select value={row.type} onChange={e=>updateRow(i,"type",e.target.value)} style={{...iSt,flex:1}}>{types.map(([v,l])=><option key={v} value={v}>{l}</option>)}</select>
          <button onClick={()=>removeRow(i)} style={{background:"none",border:"none",fontSize:20,color:C.muted,cursor:"pointer",flexShrink:0}}>×</button>
        </div>
        {row.type==="feed"&&(
          <select value={row.side} onChange={e=>updateRow(i,"side",e.target.value)} style={iSt}>
            <option>Gauche</option><option>Droit</option><option>Les deux</option><option>Biberon</option>
          </select>
        )}
        {(row.type==="poids"||row.type==="note")&&(
          <input value={row.note} onChange={e=>updateRow(i,"note",e.target.value)} placeholder={row.type==="poids"?"ex: 3.400":"remarque..."} style={iSt}/>
        )}
      </div>
    ))}
    <button onClick={addRow} style={{background:"none",border:`1.5px dashed ${C.border}`,borderRadius:12,padding:"10px",color:C.muted,fontWeight:600,cursor:"pointer",fontSize:14}}>+ Ajouter une ligne</button>
    <Btn color={C.accent} onClick={doImport}>Importer {rows.filter(r=>r.time).length} entrée(s)</Btn>
  </div>);
}

function EntryCard({entry,onDelete}){
  const cat=CATS[entry.cat];
  const[confirm,setConfirm]=useState(false);
  const parts=[];
  if(entry.side)parts.push(`Sein : ${entry.side}`);
  if(entry.duration)parts.push(durLabel(entry.duration));
  if(entry.quantity)parts.push(`${entry.quantity} ml`);
  if(entry.weight)parts.push(`${entry.weight} kg`);
  if(entry.temp)parts.push(`${entry.temp} °C`);
  if(entry.pooColor)parts.push(entry.pooColor);
  if(entry.pooTex)parts.push(entry.pooTex);
  if(entry.mood)parts.push(entry.mood);
  if(entry.vitaminDone)parts.push("✓");
  if(entry.note)parts.push(entry.note);
  if(entry.author)parts.push(`— ${entry.author}`);
  return(
    <div style={{background:C.surface,borderRadius:14,border:`1px solid ${C.border}`,padding:"12px 16px",display:"flex",alignItems:"flex-start",gap:12,position:"relative"}}>
      <div style={{width:40,height:40,borderRadius:12,background:cat.bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>{cat.emoji}</div>
      <div style={{flex:1,minWidth:0}}>
        <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
          <span style={{fontWeight:700,fontSize:14}}>{cat.label}</span>
          <span style={{fontSize:12,color:C.muted}}>{fmtTime(entry.ts)}</span>
        </div>
        {parts.length>0&&<div style={{fontSize:13,color:C.muted,marginTop:3}}>{parts.join(" · ")}</div>}
      </div>
      <button onClick={()=>setConfirm(true)} style={{background:"none",border:"none",cursor:"pointer",color:C.muted,fontSize:20,padding:"0 2px",flexShrink:0}}>×</button>
      {confirm&&(<div style={{position:"absolute",inset:0,background:"rgba(253,247,244,0.97)",borderRadius:14,display:"flex",alignItems:"center",justifyContent:"center",gap:10,zIndex:10}}>
        <span style={{fontSize:13}}>Supprimer ?</span>

        <Btn color={C.muted} onClick={()=>setConfirm(false)}>Non</Btn>
      </div>)}

  );

function TodayStats({entries}){
  const now=new Date();
  const since=new Date(now.getTime()-24*3600000);
  const te=entries.filter(e=>new Date(e.ts)>=since);
  const feeds=te.filter(e=>e.cat==="feed");
  const feedMin=feeds.reduce((s,e)=>s+(e.duration||0),0);
  const wet=te.filter(e=>e.cat==="diaper_wet").length;
  const poo=te.filter(e=>e.cat==="diaper_poo").length;
  const sleepMin=te.filter(e=>e.cat==="sleep").reduce((s,e)=>s+(e.duration||0),0);
  const lastW=entries.filter(e=>e.cat==="weight").sort((a,b)=>new Date(b.ts)-new Date(a.ts))[0];
  const heure=now.toLocaleTimeString("fr-CH",{hour:"2-digit",minute:"2-digit",timeZone:"Europe/Zurich"});
  const SC=({emoji,label,value,sub,color,bg})=>(
    <div style={{background:bg||C.surface,borderRadius:16,padding:"14px 16px",flex:"1 1 90px",minWidth:85,border:`1px solid ${C.border}`}}>
      <div style={{fontSize:20}}>{emoji}</div>
      <div style={{fontSize:20,fontWeight:700,color:color||C.text}}>{value}</div>
      <div style={{fontSize:10,color:C.muted,fontWeight:700,textTransform:"uppercase",letterSpacing:0.5}}>{label}</div>
      {sub&&<div style={{fontSize:11,color:C.muted}}>{sub}</div>}
    </div>
  );
  return(<div>
    <div style={{display:"flex",alignItems:"baseline",justifyContent:"space-between",marginBottom:10}}>
      <div style={{fontSize:12,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:1}}>Dernières 24h</div>
      <div style={{fontSize:13,fontWeight:600,color:C.accent}}>🕐 {heure}</div>
    </div>
    <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
      <SC emoji="🤱" label="Tétées" value={feeds.length} sub={feedMin?durLabel(feedMin):"—"} color={C.accent} bg={C.accentLight}/>
      <SC emoji="💧" label="Pipi" value={wet} color={C.sky} bg={C.skyLight}/>
      <SC emoji="💩" label="Caca" value={poo} color={C.golden} bg={C.goldenLight}/>
      <SC emoji="😴" label="Sommeil" value={sleepMin?durLabel(sleepMin):"—"} color={C.lavender} bg={C.lavenderLight}/>
      {lastW&&<SC emoji="⚖️" label="Poids" value={`${lastW.weight} kg`} color={C.sage} bg={C.sageLight}/>}
    </div>
  </div>);
}

function WeightChart({entries}){
  const ws=entries.filter(e=>e.cat==="weight").sort((a,b)=>new Date(a.ts)-new Date(b.ts));
  if(ws.length<2)return<div style={{color:C.muted,textAlign:"center",padding:"40px 0"}}>Ajoutez au moins 2 pesées.</div>;
  const W=300,H=160,PX=44,PY=20;
  const minW=Math.min(...ws.map(e=>e.weight))-0.05;
  const maxW=Math.max(...ws.map(e=>e.weight))+0.05;
  const toX=i=>PX+(i/(ws.length-1))*(W-PX*2);
  const toY=w=>PY+(1-(w-minW)/(maxW-minW))*(H-PY*2);
  const pts=ws.map((e,i)=>({x:toX(i),y:toY(e.weight),w:e.weight,ts:e.ts}));
  const path=pts.map((p,i)=>`${i===0?"M":"L"}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(" ");
  return(<div>
    <div style={{fontSize:12,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:1,marginBottom:12}}>Courbe de poids</div>
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",maxWidth:W}}>
      <rect width={W} height={H} fill={C.bg} rx={14}/>
      {[minW,(minW+maxW)/2,maxW].map((v,i)=>(<g key={i}><line x1={PX} y1={toY(v)} x2={W-PX} y2={toY(v)} stroke={C.border} strokeDasharray="4 3"/><text x={PX-4} y={toY(v)+4} fontSize={9} fill={C.muted} textAnchor="end">{v.toFixed(2)}</text></g>))}
      <path d={path} fill="none" stroke={C.sage} strokeWidth={2.5} strokeLinejoin="round" strokeLinecap="round"/>
      {pts.map((p,i)=>(<g key={i}><circle cx={p.x} cy={p.y} r={5} fill={C.sage}/><text x={p.x} y={p.y-9} fontSize={10} fill={C.sage} textAnchor="middle" fontWeight={700}>{p.w.toFixed(3)}</text><text x={p.x} y={H-4} fontSize={9} fill={C.muted} textAnchor="middle">{fmtDate(p.ts)}</text></g>))}
    </svg>
  </div>);
}

function App(){
  const[data,setData]=useState(DEFAULT);
  const[tab,setTab]=useState("home");
  const[modal,setModal]=useState(null);
  const[syncStatus,setSyncStatus]=useState("syncing");
  const saveTimer=useRef(null);

  useEffect(()=>{
    fbRead().then(remote=>{
      if(remote&&remote.entries&&remote.entries.length>0){setData(remote);setSyncStatus("ok");}
      else{fbWrite(DEFAULT).then(()=>setSyncStatus("ok"));}
    }).catch(()=>setSyncStatus("offline"));
  },[]);

  useEffect(()=>{
    const id=setInterval(()=>{
      fbRead().then(remote=>{
        if(!remote)return;
        setData(prev=>{
          const ids=new Set(prev.entries.map(e=>e.id));
          const newE=remote.entries.filter(e=>!ids.has(e.id));
          if(!newE.length&&remote.babyName===prev.babyName)return prev;
          return{...remote,entries:[...prev.entries,...newE].sort((a,b)=>new Date(b.ts)-new Date(a.ts))};
        });
        setSyncStatus("ok");
      }).catch(()=>setSyncStatus("offline"));
    },20000);
    return()=>clearInterval(id);
  },[]);

  function persist(next){
    setData(next); setSyncStatus("syncing");
    clearTimeout(saveTimer.current);
    saveTimer.current=setTimeout(()=>{
      fbWrite(next).then(()=>setSyncStatus("ok")).catch(()=>setSyncStatus("error"));
    },800);
  }

  const author=()=>{try{return localStorage.getItem("bt_author")||"";}catch{return"";}};
  function addEntry(payload){
    const entry={id:Date.now()+Math.random(),...payload,author:author()||undefined};
    persist({...data,entries:[entry,...data.entries]});
    setModal(null);
  }
  function importEntries(entries){
    persist({...data,entries:[...entries,...data.entries]});
    setModal(null);
  }
  function deleteEntry(id){persist({...data,entries:data.entries.filter(e=>e.id!==id)});}
  function updateMeta(patch){persist({...data,...patch});}

  function ageLabel(){
    if(!data.birthDate)return null;
    const days=Math.floor((Date.now()-new Date(data.birthDate))/86400000);
    if(days<7)return`${days} jour${days>1?"s":""}`;
    if(days<56)return`${Math.floor(days/7)} semaine${Math.floor(days/7)>1?"s":""}`;
    return`${Math.floor(days/30)} mois`;
  }

  const QUICK=[
    ["feed",C.accent],["diaper_wet",C.sky],["diaper_poo",C.golden],
    ["sleep",C.lavender],["vitamin",C.accent],["bath",C.sky],
    ["weight",C.sage],["temperature",C.red],["mood",C.sage],["note",C.muted],
  ];
  const sorted=[...data.entries].sort((a,b)=>new Date(b.ts)-new Date(a.ts));
  const syncDot={ok:"🟢",syncing:"🟡",error:"🔴",offline:"⚫"}[syncStatus]||"🟡";

  return(
    <div style={{background:C.bg,minHeight:"100vh",color:C.text}}>
      <div style={{background:C.surface,borderBottom:`1px solid ${C.border}`,padding:"14px 20px 12px",position:"sticky",top:0,zIndex:40}}>
        <div style={{maxWidth:480,margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div>
            <div style={{fontSize:20,fontWeight:800,color:C.accent}}>🌸 {data.babyName}</div>
            {ageLabel()&&<div style={{fontSize:12,color:C.muted,marginTop:2}}>{ageLabel()}</div>}
          </div>
          <span style={{fontSize:18}}>{syncDot}</span>
        </div>
      </div>

      <div style={{maxWidth:480,margin:"0 auto",padding:"20px 16px 100px"}}>
        {tab==="home"&&(<div style={{display:"flex",flexDirection:"column",gap:24}}>
          <TodayStats entries={data.entries}/>
          <div>
            <div style={{fontSize:12,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:1,marginBottom:12}}>Ajouter</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:8}}>
              {QUICK.map(([cat,color])=>{const c=CATS[cat];return(
                <button key={cat} onClick={()=>setModal(cat)} style={{background:C.surface,border:`1.5px solid ${C.border}`,borderRadius:14,padding:"10px 4px 8px",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
                  <span style={{fontSize:22}}>{c.emoji}</span>
                  <span style={{fontSize:10,color:C.muted,fontWeight:600,textAlign:"center",lineHeight:1.2}}>{c.label}</span>
                </button>
              );})}
            </div>
          </div>
          <button onClick={()=>setModal("import")} style={{background:C.surface,border:`1.5px dashed ${C.accent}`,borderRadius:14,padding:"12px",cursor:"pointer",color:C.accent,fontWeight:700,fontSize:14}}>
            📋 Importer depuis le carnet
          </button>
          {sorted.length>0&&(<div>
            <div style={{fontSize:12,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>Récent</div>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>{sorted.slice(0,5).map(e=><EntryCard key={e.id} entry={e} onDelete={deleteEntry}/>)}</div>
            {sorted.length>5&&<button onClick={()=>setTab("journal")} style={{background:"none",border:"none",color:C.accent,fontWeight:700,cursor:"pointer",marginTop:8,fontSize:14}}>Voir tout le journal →</button>}
          </div>)}
        </div>)}
        {tab==="journal"&&<Journal entries={data.entries} onDelete={deleteEntry}/>}
        {tab==="weight"&&<WeightChart entries={data.entries}/>}
        {tab==="settings"&&<Settings data={data} onUpdate={updateMeta} syncStatus={syncStatus}/>}
      </div>

      <div style={{position:"fixed",bottom:0,left:0,right:0,background:C.surface,borderTop:`1px solid ${C.border}`,display:"flex",justifyContent:"space-around",padding:"8px 0 20px",zIndex:50}}>
        {[["home","🏠","Accueil"],["journal","📋","Journal"],["weight","📈","Courbe"],["settings","⚙️","Réglages"]].map(([t,emoji,label])=>(
          <button key={t} onClick={()=>setTab(t)} style={{background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,color:tab===t?C.accent:C.muted,fontWeight:tab===t?700:400,fontSize:11}}>
            <span style={{fontSize:22}}>{emoji}</span>{label}
          </button>
        ))}
      </div>

      {modal&&(
        <div style={{position:"fixed",inset:0,background:"rgba(45,33,24,0.45)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:100}}
          onClick={e=>{if(e.target===e.currentTarget)setModal(null);}}>
          <div style={{background:C.surface,borderRadius:"20px 20px 0 0",padding:"20px 20px 40px",width:"100%",maxWidth:480,maxHeight:"85vh",overflowY:"auto"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
              <div style={{fontSize:18,fontWeight:800}}>
                {modal==="import"?"📋 Import carnet":<>{CATS[modal]?.emoji} {CATS[modal]?.label}</>}
              </div>
              <button onClick={()=>setModal(null)} style={{background:"none",border:"none",fontSize:24,cursor:"pointer",color:C.muted}}>×</button>
            </div>
            {modal==="feed"&&<FeedForm onSave={addEntry}/>}
            {(modal==="diaper_wet"||modal==="diaper_poo")&&<DiaperForm type={modal} onSave={addEntry}/>}
            {modal==="sleep"&&<SleepForm onSave={addEntry}/>}
            {modal==="weight"&&<WeightForm onSave={addEntry}/>}
            {modal==="temperature"&&<TempForm onSave={addEntry}/>}
            {(modal==="vitamin"||modal==="bath"||modal==="mood"||modal==="note")&&<SimpleForm cat={modal} color={CATS[modal].color} onSave={addEntry}/>}
            {modal==="import"&&<ImportForm onImport={importEntries}/>}
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
